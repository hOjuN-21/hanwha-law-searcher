name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # API Key и«ӣ мҶҡеҜғмҺҲи№Ӯ СҠмҠңм„Ҹл–ҶмҮ°гҲғ, еӘӣм„Ҹл–Һ  ж„ҝз”ұСҠмҳ„ -> Settings -> Secrets and variables -> Actions лЁҜкҪҢ VITE_LAW_API_KEYз‘ң з•°л¶ҪлҢҒпјңлӘ„мҠӮ.
        run: npm run build
        env:
          VITE_LAW_API_KEY: ${{ secrets.VITE_LAW_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
